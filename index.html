<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel Better Soon 💜</title>
    <style>
        body {
            /* Changed background to a light lavender */
            background-color: #f3e5f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            /* Changed shadow to a purple tint */
            box-shadow: 0 10px 25px rgba(156, 39, 176, 0.3);
            z-index: 10;
            max-width: 80%;
        }

        h1 {
            /* Changed heading to a vibrant purple */
            color: #7b1fa2;
        }

        p {
            color: #4a148c;
            font-size: 1.2rem;
        }

        button {
            /* Changed button to match the purple theme */
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.1);
            background-color: #ba68c8;
        }

        #quote-display {
            margin-top: 20px;
            font-style: italic;
            font-weight: bold;
            color: #6a1b9a;
            min-height: 50px;
        }

        /* Heart Animation */
        .heart {
            position: absolute;
            /* Changed floating heart color to a soft purple */
            color: #ce93d8;
            font-size: 20px;
            user-select: none;
            animation: float 4s linear forwards;
        }

        @keyframes float {
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hi Lilith 💜</h1>
    <p>I know yesterday was rough. I hope today you're feeling a little bit better.</p>
    <div id="quote-display">Please click me...</div>
    <button onclick="revealLove()">Click Me!</button>
</div>

<script>
    const quotes = [
        "You're the best girlfriend ever <3",
        "I love you more than anything!",
        "I appreciate everything you do for me.",
        "I'll always be here for you.",
        "You are always the best part of my day",
        "I love you more than anything in life."
        "You're the first thing I think about every morning."
        "I will marry you one day"
    ];

    function revealLove() {
        const display = document.getElementById('quote-display');
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        display.innerText = randomQuote;

        for (let i = 0; i < 15; i++) {
            createHeart();
        }
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        // Changed the heart emoji to purple
        heart.innerHTML = '💜'; 
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.top = '100vh';
        heart.style.fontSize = Math.random() * 20 + 10 + 'px';
        
        // Fixed a small bug: animationDuration must be set on style
        const duration = Math.random() * 2 + 3;
        heart.style.animationDuration = duration + 's';
        
        document.body.appendChild(heart);
        setTimeout(() => {
            heart.remove();
        }, duration * 1000);
    }
</script>

</body>
</html>
